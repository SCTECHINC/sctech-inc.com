/* ============ HERO ============ */
function ParticleHero() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
    const particles = [];
    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      W = rect.width; H = rect.height;
      canvas.width = W * DPR; canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);

    const N = 90;
    for (let i = 0; i < N; i++) {
      const r = Math.random();
      particles.push({
        x: Math.random(), y: Math.random(),
        vx: (Math.random() - 0.5) * 0.0004,
        vy: (Math.random() - 0.5) * 0.0004,
        s: 0.6 + Math.random() * 1.8,
        hot: r > 0.82, // orange dots
      });
    }
    const mouse = { x: 0.5, y: 0.5, active: false };
    const onMove = (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = (e.clientX - rect.left) / rect.width;
      mouse.y = (e.clientY - rect.top) / rect.height;
      mouse.active = true;
    };
    const onLeave = () => { mouse.active = false; };
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseleave', onLeave);

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      // update
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (mouse.active) {
          const dx = mouse.x - p.x, dy = mouse.y - p.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < 0.02) {
            p.x -= dx * 0.02; p.y -= dy * 0.02;
          }
        }
        if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
        if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;
      }
      // lines
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = (a.x - b.x) * W, dy = (a.y - b.y) * H;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 120) {
            const op = (1 - d / 120) * 0.18;
            ctx.strokeStyle = `oklch(68% 0.195 42 / ${op})`;
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(a.x * W, a.y * H);
            ctx.lineTo(b.x * W, b.y * H);
            ctx.stroke();
          }
        }
      }
      // dots
      for (const p of particles) {
        ctx.beginPath();
        ctx.fillStyle = p.hot ? 'oklch(68% 0.195 42 / 0.9)' : 'oklch(28% 0.01 60 / 0.5)';
        ctx.arc(p.x * W, p.y * H, p.s, 0, Math.PI * 2);
        ctx.fill();
        if (p.hot) {
          ctx.beginPath();
          ctx.fillStyle = 'oklch(68% 0.195 42 / 0.2)';
          ctx.arc(p.x * W, p.y * H, p.s * 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
      canvas.removeEventListener('mousemove', onMove);
      canvas.removeEventListener('mouseleave', onLeave);
    };
  }, []);
  return (<canvas ref={canvasRef} style={{position:'absolute', inset:0, width:'100%', height:'100%', display:'block'}} />);
}

                     onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,.75)'}>{x}</a>
                ))}
              </div>
            </div>
          ))}
        </div>

          <div>© 2026 SCTECH INC. All rights reserved.</div>
          <div style={{display:'flex', alignItems:'center', gap: 8}}>

        @media (max-width: 980px){ .foot-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; } }
        @media (max-width: 560px){ .foot-grid { grid-template-columns: 1fr !important; } }

}

/* ============ APP ============ */
function App() {
  // Scroll reveal
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  return (
    <>
      <Nav />
      <Hero />
      <Services />
      <Stats />
      <ProductDemo />
      <Features />
      <Process />
      <Cases />
      <Testimonials />
      <FAQ />
      <CTA />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
